<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - ExpensePro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        .navbar { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .navbar .brand { font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .navbar .links { display: flex; gap: 20px; align-items:center; }
        .navbar a.nav-link { text-decoration: none; color: var(--text-muted); font-weight: 500; padding: 8px 12px; border-radius: 6px; }
        .navbar a.nav-link.active, .navbar a.nav-link:hover { color: var(--primary); background-color: #e0e7ff; }
        
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #ec4899); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; }
        .user-info h1 { font-size: 2rem; font-weight: 700; }
        .user-info p { color: var(--text-muted); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .val { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'index' %}" class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h0M2 9.5h20"/></svg>
            ExpensePro
        </a>
        <div class="links">
            <a href="{% url 'index' %}" class="nav-link">Dashboard</a>
            <a href="{% url 'analysis' %}" class="nav-link">Analytics & ML</a>
            <a href="{% url 'profile' %}" class="nav-link active">Profile</a>
            <a href="{% url 'logout' %}" style="display:inline-block;"><button style="padding: 6px 12px; margin-left:10px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Logout {{ user.username }}</button></a>
        </div>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="avatar">{{ user.username|make_list|first|upper }}</div>
            <div class="user-info">
                <h1>{{ user.username }}</h1>
                <p>Member since {{ user.date_joined|date:"M j, Y" }}</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Lifetime Spending</h3>
                <div class="val">${{ total_spent|floatformat:2 }}</div>
            </div>
            <div class="stat-card">
                <h3>Total Entries Logged</h3>
                <div class="val">{{ expense_count }}</div>
            </div>
        </div>
    </div>
</body>
</html>
